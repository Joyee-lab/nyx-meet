<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nyx Meet — Room</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="room-page">

<!-- ── PREJOIN SCREEN ───────────────────────── -->
<div class="prejoin-overlay" id="prejoinScreen">
  <div class="prejoin-card">
    <div class="prejoin-logo">☽ NyxMeet</div>
    <h2 class="prejoin-title">Ready to join?</h2>
    <div class="prejoin-preview">
      <video id="previewVideo" autoplay muted playsinline></video>
      <div class="preview-off" id="previewOff">📷 Camera is off</div>
    </div>
    <div class="prejoin-name-row">
      <input type="text" id="nameInput" placeholder="Enter your name..." maxlength="20" />
    </div>
    <div class="prejoin-controls">
      <button class="pre-ctrl" id="preMicBtn" onclick="togglePreMic()">🎙️ Mic On</button>
      <button class="pre-ctrl" id="preCamBtn" onclick="togglePreCam()">📷 Cam On</button>
    </div>
    <button class="prejoin-join-btn" onclick="joinFromPrejoin()">Join Now →</button>
  </div>
</div>

<!-- ── MAIN ROOM ─────────────────────────────── -->
<div class="room-wrapper" id="roomWrapper" style="display:none">

  <header class="room-header">
    <div class="header-left">
      <span class="logo-small">☽ NyxMeet</span>
      <span class="room-badge" id="roomLabel">Room: ...</span>
    </div>
    <div class="header-right">
      <span class="timer" id="callTimer">00:00:00</span>
      <button class="header-btn" id="participantsToggle" onclick="toggleParticipantsPanel()">👥 <span id="participantCount">1</span></button>
      <button class="header-btn" onclick="toggleCamPanel()">🎥</button>
      <button class="header-btn" onclick="toggleChat()">💬</button>
    </div>
  </header>

  <div class="room-body">
    <!-- Video Grid -->
    <div class="video-grid" id="videoGrid"></div>

    <!-- Participants Panel -->
    <div class="side-panel" id="participantsPanel" style="display:none">
      <div class="panel-header">
        <span>👥 Participants</span>
        <button onclick="toggleParticipantsPanel()">✕</button>
      </div>
      <div class="participants-list" id="participantsList"></div>
    </div>

    <!-- Camera Panel (Zoom-style) -->
    <div class="cam-panel" id="camPanel" style="display:none">
      <div class="cam-panel-header">
        <span>🎥 Cameras</span>
        <button onclick="toggleCamPanel()">✕</button>
      </div>
      <div class="cam-panel-grid" id="camPanelGrid"></div>
    </div>

    <!-- Chat Panel -->
    <div class="side-panel" id="chatPanel" style="display:none">
      <div class="panel-header">
        <span>💬 Chat</span>
        <button onclick="toggleChat()">✕</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Type a message..." maxlength="300" />
        <button onclick="sendChat()">➤</button>
      </div>
    </div>
  </div>

  <!-- Notifications -->
  <div class="notif-stack" id="notifStack"></div>

  <!-- Controls -->
  <div class="controls-bar">
    <div class="ctrl-group">
      <button class="ctrl-btn" id="micBtn" onclick="toggleMic()">
        <span id="micIcon">🎙️</span>
        <span class="ctrl-label">Mute</span>
      </button>
      <button class="ctrl-btn ctrl-arrow" onclick="openDevicePanel('audio')">▲</button>
    </div>
    <div class="ctrl-group">
      <button class="ctrl-btn" id="camBtn" onclick="toggleCam()">
        <span id="camIcon">📷</span>
        <span class="ctrl-label">Camera</span>
      </button>
      <button class="ctrl-btn ctrl-arrow" onclick="openDevicePanel('video')">▲</button>
    </div>
    <button class="ctrl-btn" id="screenBtn" onclick="toggleScreen()">
      <span>🖥️</span>
      <span class="ctrl-label">Share</span>
    </button>
    <button class="ctrl-btn danger" onclick="leaveRoom()">
      <span>📵</span>
      <span class="ctrl-label">Leave</span>
    </button>
  </div>

</div>

<!-- Device Panel -->
<div class="device-panel" id="devicePanel">
  <div class="device-panel-header">
    <span id="devicePanelTitle">Select Device</span>
    <button onclick="closeDevicePanel()">✕</button>
  </div>
  <div class="device-list" id="deviceList"></div>
</div>
<div class="device-overlay" id="deviceOverlay" onclick="closeDevicePanel()"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const ROOM_ID = params.get("room") || "default";
  let MY_NAME = "Guest";
  let MY_ID = Math.random().toString(36).substring(2, 10);

  document.getElementById("roomLabel").textContent = `Room: ${ROOM_ID}`;
  document.title = `Nyx Meet — ${ROOM_ID}`;

  const socket = io();
  const peers = {};
  const peerNames = {};
  const peerMuted = {};

  let localStream = null;
  let previewStream = null;
  let screenStream = null;
  let micOn = true;
  let camOn = true;
  let sharing = false;
  let preMicOn = true;
  let preCamOn = true;
  let selectedAudioId = null;
  let selectedVideoId = null;

  // ── PREJOIN ─────────────────────────────────
  async function startPreview() {
    try {
      previewStream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } },
        audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 48000 }
      });
      const v = document.getElementById("previewVideo");
      v.srcObject = previewStream;
      document.getElementById("previewOff").style.display = "none";
    } catch(e) {
      document.getElementById("previewOff").style.display = "flex";
    }
  }

  function togglePreMic() {
    preMicOn = !preMicOn;
    if (previewStream) previewStream.getAudioTracks().forEach(t => t.enabled = preMicOn);
    const btn = document.getElementById("preMicBtn");
    btn.textContent = preMicOn ? "🎙️ Mic On" : "🔇 Mic Off";
    btn.classList.toggle("off", !preMicOn);
  }

  function togglePreCam() {
    preCamOn = !preCamOn;
    if (previewStream) previewStream.getVideoTracks().forEach(t => t.enabled = preCamOn);
    const btn = document.getElementById("preCamBtn");
    btn.textContent = preCamOn ? "📷 Cam On" : "🚫 Cam Off";
    btn.classList.toggle("off", !preCamOn);
    document.getElementById("previewOff").style.display = preCamOn ? "none" : "flex";
  }

  function joinFromPrejoin() {
    const nameVal = document.getElementById("nameInput").value.trim();
    MY_NAME = nameVal || "Guest";
    micOn = preMicOn;
    camOn = preCamOn;
    localStream = previewStream;
    document.getElementById("prejoinScreen").style.display = "none";
    document.getElementById("roomWrapper").style.display = "flex";
    startRoom();
  }

  document.getElementById("nameInput").addEventListener("keydown", e => { if (e.key === "Enter") joinFromPrejoin(); });

  // ── TIMER ────────────────────────────────────
  let seconds = 0;
  let timerInterval = null;
  function startTimer() {
    timerInterval = setInterval(() => {
      seconds++;
      const h = String(Math.floor(seconds / 3600)).padStart(2,"0");
      const m = String(Math.floor((seconds % 3600) / 60)).padStart(2,"0");
      const s = String(seconds % 60).padStart(2,"0");
      document.getElementById("callTimer").textContent = `${h}:${m}:${s}`;
    }, 1000);
  }

  // ── NOTIFICATIONS ────────────────────────────
  function showNotif(msg, type = "info") {
    const stack = document.getElementById("notifStack");
    const n = document.createElement("div");
    n.className = `notif notif-${type}`;
    n.textContent = msg;
    stack.appendChild(n);
    setTimeout(() => n.classList.add("show"), 10);
    setTimeout(() => { n.classList.remove("show"); setTimeout(() => n.remove(), 400); }, 3500);
  }

  // ── CHAT ─────────────────────────────────────
  function addChatMsg(name, msg, isSelf = false) {
    const box = document.getElementById("chatMessages");
    const div = document.createElement("div");
    div.className = `chat-msg ${isSelf ? "self" : "other"}`;
    div.innerHTML = `<span class="chat-name">${name}</span><span class="chat-text">${msg}</span>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    // badge
    if (!document.getElementById("chatPanel").style.display || document.getElementById("chatPanel").style.display === "none") {
      const btn = document.querySelector(".header-btn[onclick='toggleChat()']");
      if (btn) btn.classList.add("badge");
    }
  }

  function sendChat() {
    const input = document.getElementById("chatInput");
    const msg = input.value.trim();
    if (!msg) return;
    socket.emit("chat", { roomId: ROOM_ID, name: MY_NAME, msg });
    addChatMsg(MY_NAME, msg, true);
    input.value = "";
  }

  document.getElementById("chatInput").addEventListener("keydown", e => { if (e.key === "Enter") sendChat(); });

  function toggleChat() {
    const panel = document.getElementById("chatPanel");
    const open = panel.style.display === "none" || !panel.style.display;
    panel.style.display = open ? "flex" : "none";
    if (open) {
      document.querySelector(".header-btn[onclick='toggleChat()']").classList.remove("badge");
      document.getElementById("chatMessages").scrollTop = document.getElementById("chatMessages").scrollHeight;
    }
  }

  // ── PARTICIPANTS PANEL ───────────────────────
  function toggleParticipantsPanel() {
    const panel = document.getElementById("participantsPanel");
    panel.style.display = (panel.style.display === "none" || !panel.style.display) ? "flex" : "none";
  }

  function updateParticipantsList() {
    const list = document.getElementById("participantsList");
    list.innerHTML = "";

    // Self
    const selfDiv = document.createElement("div");
    selfDiv.className = "participant-item";
    selfDiv.innerHTML = `
      <div class="p-avatar">${MY_NAME[0].toUpperCase()}</div>
      <div class="p-info">
        <span class="p-name">${MY_NAME} (You)</span>
        <span class="p-status">${micOn ? "🎙️" : "🔇"} ${camOn ? "📷" : "🚫"}</span>
      </div>`;
    list.appendChild(selfDiv);

    // Others
    Object.entries(peerNames).forEach(([id, name]) => {
      const div = document.createElement("div");
      div.className = "participant-item";
      div.innerHTML = `
        <div class="p-avatar">${name[0].toUpperCase()}</div>
        <div class="p-info">
          <span class="p-name">${name}</span>
          <span class="p-status">${peerMuted[id] ? "🔇" : "🎙️"}</span>
        </div>
        <button class="p-mute-btn" onclick="muteParticipant('${id}')" title="Mute/Unmute">
          ${peerMuted[id] ? "🔊" : "🔇"}
        </button>`;
      list.appendChild(div);
    });

    document.getElementById("participantCount").textContent = Object.keys(peerNames).length + 1;
  }

  function muteParticipant(peerId) {
    const tile = document.getElementById(`tile-${peerId}`);
    if (!tile) return;
    const video = tile.querySelector("video");
    peerMuted[peerId] = !peerMuted[peerId];
    video.muted = peerMuted[peerId];
    updateParticipantsList();
  }

  // ── VIDEO TILES ──────────────────────────────
  function addVideoStream(id, stream, name, isLocal = false) {
    if (document.getElementById(`tile-${id}`)) return;
    const tile = document.createElement("div");
    tile.className = "video-tile";
    tile.id = `tile-${id}`;

    const video = document.createElement("video");
    video.srcObject = stream;
    video.autoplay = true;
    video.playsInline = true;
    video.muted = isLocal; // only mute self, never mute remote
    video.volume = 1.0;

    // iOS/Safari fix - need user interaction to play audio
    video.addEventListener("loadedmetadata", () => {
      video.play().catch(e => console.warn("Autoplay blocked:", e));
    });

    const label = document.createElement("div");
    label.className = "video-label";
    label.textContent = isLocal ? `${name} (You)` : name;

    // Camera panel thumbnail
    addCamPanelTile(id, stream, name, isLocal);

    tile.appendChild(video);
    tile.appendChild(label);
    document.getElementById("videoGrid").appendChild(tile);
  }

  function removeVideoStream(id) {
    const tile = document.getElementById(`tile-${id}`);
    if (tile) tile.remove();
    const camTile = document.getElementById(`cam-${id}`);
    if (camTile) camTile.remove();
  }

  // ── WEBRTC ───────────────────────────────────
  const ICE_CONFIG = {
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" },
      { urls: "stun:stun1.l.google.com:19302" },
      { urls: "stun:stun2.l.google.com:19302" },
      { urls: "stun:stun3.l.google.com:19302" },
      { urls: "stun:stun4.l.google.com:19302" },
      { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" },
      { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" },
      { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelayproject", credential: "openrelayproject" },
      { urls: "turns:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" }
    ],
    iceCandidatePoolSize: 10
  };

  function createPeer(userId, initiator, userName) {
    const peer = new SimplePeer({ initiator, trickle: true, stream: localStream, config: ICE_CONFIG });

    peer.on("signal", signal => socket.emit("signal", { to: userId, from: MY_ID, signal, name: MY_NAME }));

    peer.on("stream", stream => {
      peerNames[userId] = userName || "Guest";
      // update video if tile already exists
      const existing = document.getElementById(`tile-${userId}`);
      if (existing) {
        existing.querySelector("video").srcObject = stream;
        const camTile = document.getElementById(`cam-${userId}`);
        if (camTile) camTile.querySelector("video").srcObject = stream;
      } else {
        addVideoStream(userId, stream, peerNames[userId]);
      }
      updateParticipantsList();
    });

    peer.on("track", (track, stream) => {
      // Fallback: update video when individual track arrives
      const tile = document.getElementById(`tile-${userId}`);
      if (tile && stream) {
        tile.querySelector("video").srcObject = stream;
      }
    });

    peer.on("close", () => {
      removeVideoStream(userId);
      delete peers[userId];
      delete peerNames[userId];
      delete peerMuted[userId];
      updateParticipantsList();
    });

    peer.on("error", err => {
      console.error("Peer error:", err);
    });

    peers[userId] = peer;
    return peer;
  }

  // ── SOCKET ───────────────────────────────────
  // Get list of users already in room -> we initiate to each of them
  socket.on("existing-users", (users) => {
    console.log("Existing users:", users);
    users.forEach(({ userId, name }) => {
      if (userId !== MY_ID) {
        peerNames[userId] = name;
        createPeer(userId, true, name); // we are the initiator
      }
    });
    updateParticipantsList();
  });

  // New user joined -> they will initiate to us, we just wait for signal
  socket.on("user-connected", ({ userId, name }) => {
    console.log("User connected:", userId, name);
    peerNames[userId] = name;
    showNotif(`${name} joined the room 🎉`, "join");
    updateParticipantsList();
  });

  socket.on("signal", ({ from, signal, name }) => {
    console.log("Signal from:", from, signal.type || "candidate");
    if (!peers[from]) {
      // we're the receiver
      peerNames[from] = name || peerNames[from] || "Guest";
      createPeer(from, false, peerNames[from]);
    }
    try { peers[from].signal(signal); } catch(e) { console.error("Signal error:", e); }
  });

  socket.on("user-disconnected", ({ userId, name }) => {
    if (peers[userId]) { peers[userId].destroy(); delete peers[userId]; }
    removeVideoStream(userId);
    delete peerNames[userId];
    delete peerMuted[userId];
    showNotif(`${name} left the room 👋`, "leave");
    updateParticipantsList();
  });

  socket.on("chat-message", ({ name, msg }) => {
    addChatMsg(name, msg);
    showNotif(`${name}: ${msg.substring(0, 40)}`, "chat");
  });

  // ── CONTROLS ─────────────────────────────────
  function toggleMic() {
    micOn = !micOn;
    localStream.getAudioTracks().forEach(t => t.enabled = micOn);
    document.getElementById("micIcon").textContent = micOn ? "🎙️" : "🔇";
    document.getElementById("micBtn").classList.toggle("off", !micOn);
    document.querySelector("#micBtn .ctrl-label").textContent = micOn ? "Mute" : "Unmute";
    updateParticipantsList();
  }

  function toggleCam() {
    camOn = !camOn;
    localStream.getVideoTracks().forEach(t => t.enabled = camOn);
    document.getElementById("camIcon").textContent = camOn ? "📷" : "🚫";
    document.getElementById("camBtn").classList.toggle("off", !camOn);
    document.querySelector("#camBtn .ctrl-label").textContent = camOn ? "Camera" : "Cam Off";
    updateParticipantsList();
  }

  async function toggleScreen() {
    if (!sharing) {
      try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({
          video: { cursor: "always" },
          audio: true // request system audio
        });
        const screenVideoTrack = screenStream.getVideoTracks()[0];
        const screenAudioTrack = screenStream.getAudioTracks()[0];

        Object.values(peers).forEach(peer => {
          const senders = peer._pc.getSenders();
          // Replace video track
          const videoSender = senders.find(s => s.track && s.track.kind === "video");
          if (videoSender) videoSender.replaceTrack(screenVideoTrack);
          // Add/replace audio track with screen audio if available
          if (screenAudioTrack) {
            const audioSender = senders.find(s => s.track && s.track.kind === "audio");
            if (audioSender) audioSender.replaceTrack(screenAudioTrack);
          }
        });

        // Show screen in local tile
        const combinedStream = new MediaStream([
          screenVideoTrack,
          ...(screenAudioTrack ? [screenAudioTrack] : localStream.getAudioTracks())
        ]);
        document.querySelector(`#tile-${MY_ID} video`).srcObject = combinedStream;

        sharing = true;
        document.getElementById("screenBtn").classList.add("active-share");
        document.querySelector("#screenBtn .ctrl-label").textContent = "Stop";
        screenVideoTrack.onended = stopScreen;
      } catch(e) { console.error(e); }
    } else { stopScreen(); }
  }

  function stopScreen() {
    if (!screenStream) return;
    screenStream.getTracks().forEach(t => t.stop());

    const camTrack = localStream.getVideoTracks()[0];
    const micTrack = localStream.getAudioTracks()[0];

    Object.values(peers).forEach(peer => {
      const senders = peer._pc.getSenders();
      const videoSender = senders.find(s => s.track && s.track.kind === "video");
      if (videoSender && camTrack) videoSender.replaceTrack(camTrack);
      const audioSender = senders.find(s => s.track && s.track.kind === "audio");
      if (audioSender && micTrack) audioSender.replaceTrack(micTrack);
    });

    document.querySelector(`#tile-${MY_ID} video`).srcObject = localStream;
    sharing = false;
    document.getElementById("screenBtn").classList.remove("active-share");
    document.querySelector("#screenBtn .ctrl-label").textContent = "Share";
    screenStream = null;
  }

  function leaveRoom() {
    if (confirm("Leave the room?")) {
      localStream?.getTracks().forEach(t => t.stop());
      screenStream?.getTracks().forEach(t => t.stop());
      window.location.href = "/";
    }
  }

  // ── DEVICE SELECTOR ──────────────────────────
  async function openDevicePanel(kind) {
    const devices = await navigator.mediaDevices.enumerateDevices();
    const filtered = devices.filter(d => d.kind === (kind === "audio" ? "audioinput" : "videoinput"));
    document.getElementById("devicePanelTitle").textContent = kind === "audio" ? "🎙️ Choose Microphone" : "📷 Choose Camera";
    const list = document.getElementById("deviceList");
    list.innerHTML = "";
    filtered.forEach(device => {
      const btn = document.createElement("button");
      btn.className = "device-item";
      const isSelected = kind === "audio" ? device.deviceId === selectedAudioId : device.deviceId === selectedVideoId;
      if (isSelected) btn.classList.add("selected");
      btn.textContent = device.label || `Device ${device.deviceId.slice(0,8)}`;
      btn.onclick = () => selectDevice(kind, device.deviceId);
      list.appendChild(btn);
    });
    document.getElementById("devicePanel").classList.add("open");
    document.getElementById("deviceOverlay").classList.add("open");
  }

  function closeDevicePanel() {
    document.getElementById("devicePanel").classList.remove("open");
    document.getElementById("deviceOverlay").classList.remove("open");
  }

  async function selectDevice(kind, deviceId) {
    if (kind === "audio") selectedAudioId = deviceId;
    else selectedVideoId = deviceId;
    closeDevicePanel();
    const newStream = await navigator.mediaDevices.getUserMedia({
      video: selectedVideoId
        ? { deviceId: { exact: selectedVideoId }, width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } }
        : { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } },
      audio: selectedAudioId
        ? { deviceId: { exact: selectedAudioId }, echoCancellation: true, noiseSuppression: true, sampleRate: 48000 }
        : { echoCancellation: true, noiseSuppression: true, sampleRate: 48000 },
    });
    const oldStream = localStream;
    localStream = newStream;
    if (!micOn) localStream.getAudioTracks().forEach(t => t.enabled = false);
    if (!camOn) localStream.getVideoTracks().forEach(t => t.enabled = false);
    document.querySelector(`#tile-${MY_ID} video`).srcObject = localStream;
    oldStream.getTracks().forEach(t => t.stop());
    Object.values(peers).forEach(peer => {
      localStream.getTracks().forEach(track => {
        const sender = peer._pc.getSenders().find(s => s.track && s.track.kind === track.kind);
        if (sender) sender.replaceTrack(track);
      });
    });
  }

  // ── CAM PANEL ────────────────────────────────
  function toggleCamPanel() {
    const panel = document.getElementById("camPanel");
    panel.style.display = (panel.style.display === "none" || !panel.style.display) ? "flex" : "none";
  }

  function addCamPanelTile(id, stream, name, isLocal = false) {
    if (document.getElementById(`cam-${id}`)) return;
    const tile = document.createElement("div");
    tile.className = "cam-tile";
    tile.id = `cam-${id}`;

    const video = document.createElement("video");
    video.srcObject = stream;
    video.autoplay = true;
    video.playsInline = true;
    video.muted = true; // always muted in cam panel to avoid echo

    const label = document.createElement("div");
    label.className = "cam-label";
    label.textContent = isLocal ? `${name} (You)` : name;

    tile.appendChild(video);
    tile.appendChild(label);
    document.getElementById("camPanelGrid").appendChild(tile);
  }

  // ── START ROOM ───────────────────────────────
  function startRoom() {
    if (!micOn) localStream.getAudioTracks().forEach(t => t.enabled = false);
    if (!camOn) localStream.getVideoTracks().forEach(t => t.enabled = false);
    addVideoStream(MY_ID, localStream, MY_NAME, true);
    updateParticipantsList();
    startTimer();
    socket.emit("join-room", { roomId: ROOM_ID, userId: MY_ID, name: MY_NAME });
  }

  startPreview();
</script>
</body>
</html>
