<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nyx Meet — Room</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="room-page">

<!-- ── PREJOIN SCREEN ───────────────────────── -->
<div class="prejoin-overlay" id="prejoinScreen">
  <div class="prejoin-card">
    <div class="prejoin-logo">☽ NyxMeet</div>
    <h2 class="prejoin-title">Ready to join?</h2>
    <div class="prejoin-preview">
      <video id="previewVideo" autoplay muted playsinline></video>
      <div class="preview-off" id="previewOff">📷 Camera is off</div>
    </div>
    <div class="prejoin-name-row">
      <input type="text" id="nameInput" placeholder="Enter your name..." maxlength="20" />
    </div>
    <div class="prejoin-controls">
      <button class="pre-ctrl" id="preMicBtn" onclick="togglePreMic()">🎙️ Mic On</button>
      <button class="pre-ctrl" id="preCamBtn" onclick="togglePreCam()">📷 Cam On</button>
    </div>
    <button class="prejoin-join-btn" onclick="joinFromPrejoin()">Join Now →</button>
  </div>
</div>

<!-- ── MAIN ROOM ─────────────────────────────── -->
<div class="room-wrapper" id="roomWrapper" style="display:none">

  <header class="room-header">
    <div class="header-left">
      <span class="logo-small">☽ NyxMeet</span>
      <span class="room-badge" id="roomLabel">Room: ...</span>
    </div>
    <div class="header-right">
      <span class="timer" id="callTimer">00:00:00</span>
      <button class="header-btn" id="participantsToggle" onclick="toggleParticipantsPanel()">👥 <span id="participantCount">1</span></button>
      <button class="header-btn" onclick="toggleCamPanel()">🎥</button>
      <button class="header-btn" onclick="toggleChat()">💬</button>
      <button class="header-btn" id="dmHeaderBtn" onclick="toggleDmList()" style="display:none">✉️ <span id="dmBadge" style="display:none">●</span></button>
    </div>
  </header>

  <div class="room-body">
    <!-- Video Grid -->
    <div class="video-grid" id="videoGrid"></div>

    <!-- Participants Panel -->
    <div class="side-panel" id="participantsPanel" style="display:none">
      <div class="panel-header">
        <span>👥 Participants</span>
        <button onclick="toggleParticipantsPanel()">✕</button>
      </div>
      <div class="participants-list" id="participantsList"></div>
    </div>

    <!-- Camera Panel (Zoom-style) -->
    <div class="cam-panel" id="camPanel" style="display:none">
      <div class="cam-panel-header">
        <span>🎥 Cameras</span>
        <button onclick="toggleCamPanel()">✕</button>
      </div>
      <div class="cam-panel-grid" id="camPanelGrid"></div>
    </div>

    <!-- Chat Panel -->
    <div class="side-panel" id="chatPanel" style="display:none">
      <div class="panel-header">
        <span>💬 Chat</span>
        <button onclick="toggleChat()">✕</button>
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Type a message..." maxlength="300" />
        <button onclick="sendChat()">➤</button>
      </div>
    </div>
  </div>

  <!-- Notifications -->
  <div class="notif-stack" id="notifStack"></div>

  <!-- Controls -->
  <div class="controls-bar">
    <div class="ctrl-group">
      <button class="ctrl-btn" id="micBtn" onclick="toggleMic()">
        <span id="micIcon">🎙️</span>
        <span class="ctrl-label">Mute</span>
      </button>
      <button class="ctrl-btn ctrl-arrow" onclick="openDevicePanel('audio')">▲</button>
    </div>
    <div class="ctrl-group">
      <button class="ctrl-btn" id="camBtn" onclick="toggleCam()">
        <span id="camIcon">📷</span>
        <span class="ctrl-label">Camera</span>
      </button>
      <button class="ctrl-btn ctrl-arrow" onclick="openDevicePanel('video')">▲</button>
    </div>
    <button class="ctrl-btn" id="mirrorBtn" onclick="toggleMirror()" title="Mirror my video">
      <span>🔁</span>
      <span class="ctrl-label">Mirror</span>
    </button>
    <button class="ctrl-btn" id="screenBtn" onclick="toggleScreen()">
      <span>🖥️</span>
      <span class="ctrl-label">Share</span>
    </button>
    <button class="ctrl-btn" onclick="toggleLayoutPanel()" id="layoutBtn">
      <span>⊞</span>
      <span class="ctrl-label">Layout</span>
    </button>
    <button class="ctrl-btn danger" onclick="leaveRoom()">
      <span>📵</span>
      <span class="ctrl-label">Leave</span>
    </button>
  </div>

</div>

<!-- Layout Panel -->
<div class="layout-panel" id="layoutPanel" style="display:none">
  <div class="layout-panel-header">
    <span>⊞ Video Layout</span>
    <button onclick="toggleLayoutPanel()">✕</button>
  </div>
  <div class="layout-grid">
    <button class="layout-option active" id="layout-gallery" onclick="setLayout('gallery')">
      <div class="layout-preview gallery-preview">
        <span></span><span></span><span></span><span></span>
      </div>
      <span class="layout-name">Gallery</span>
    </button>
    <button class="layout-option" id="layout-speaker" onclick="setLayout('speaker')">
      <div class="layout-preview speaker-preview">
        <span class="big"></span>
        <div class="smalls"><span></span><span></span></div>
      </div>
      <span class="layout-name">Speaker</span>
    </button>
    <button class="layout-option" id="layout-fullscreen" onclick="setLayout('fullscreen')">
      <div class="layout-preview fullscreen-preview">
        <span></span>
      </div>
      <span class="layout-name">Fullscreen</span>
    </button>
    <button class="layout-option" id="layout-multispeaker" onclick="setLayout('multispeaker')">
      <div class="layout-preview multispeaker-preview">
        <span class="big"></span>
        <span></span><span></span><span></span>
      </div>
      <span class="layout-name">Multi-Speaker</span>
    </button>
    <button class="layout-option" id="layout-immersive" onclick="setLayout('immersive')">
      <div class="layout-preview immersive-preview">
        <span class="main"></span>
        <span class="overlay"></span>
      </div>
      <span class="layout-name">Immersive</span>
    </button>
    <button class="layout-option" id="layout-floating" onclick="setLayout('floating')">
      <div class="layout-preview floating-preview">
        <span class="bg"></span>
        <span class="pip"></span>
      </div>
      <span class="layout-name">Floating</span>
    </button>
  </div>
</div>
<div class="layout-overlay" id="layoutOverlay" onclick="toggleLayoutPanel()"></div>

<!-- Floating thumbnail (PiP) -->
<div class="floating-pip" id="floatingPip" style="display:none">
  <div class="pip-drag-handle" id="pipHandle">⠿</div>
  <video id="pipVideo" autoplay muted playsinline></video>
  <div class="pip-label">You</div>
</div>

<!-- DM Panel -->
<div class="side-panel dm-panel" id="dmPanel" style="display:none">
  <div class="panel-header">
    <div class="dm-header-left">
      <button class="dm-back-btn" onclick="closeDm()">← Back</button>
      <span id="dmPanelTitle">DM</span>
    </div>
    <button onclick="closeDm()">✕</button>
  </div>
  <div class="chat-messages" id="dmMessages"></div>
  <div class="chat-input-row">
    <input type="text" id="dmInput" placeholder="Send a DM..." maxlength="300" />
    <button onclick="sendDm()">➤</button>
  </div>
</div>

<!-- Device Panel -->
<div class="device-panel" id="devicePanel">
  <div class="device-panel-header">
    <span id="devicePanelTitle">Select Device</span>
    <button onclick="closeDevicePanel()">✕</button>
  </div>
  <div class="device-list" id="deviceList"></div>
</div>
<div class="device-overlay" id="deviceOverlay" onclick="closeDevicePanel()"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://cdn.jsdelivr.net/npm/simple-peer@9.11.1/simplepeer.min.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const ROOM_ID = params.get("room") || "default";
  let MY_NAME = "Guest";
  let MY_ID = Math.random().toString(36).substring(2, 10);

  document.getElementById("roomLabel").textContent = `Room: ${ROOM_ID}`;
  document.title = `Nyx Meet — ${ROOM_ID}`;

  const socket = io();
  const peers = {};
  const peerNames = {};
  const peerMuted = {};

  let isHost = false;
  let hostId = null;
  let localStream = null;
  let dmConversations = {}; // userId -> [{ from, msg, time }]
  let activeDmUserId = null;
  let previewStream = null;
  let screenStream = null;
  let micOn = true;
  let camOn = true;
  let sharing = false;
  let preMicOn = true;
  let preCamOn = true;
  let selectedAudioId = null;
  let selectedVideoId = null;

  // ── PREJOIN ─────────────────────────────────
  async function startPreview() {
    try {
      previewStream = await navigator.mediaDevices.getUserMedia({
        video: { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } },
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true,
          sampleRate: 48000,
          sampleSize: 16,
          channelCount: 2,
          latency: 0,
          googEchoCancellation: true,
          googAutoGainControl: true,
          googNoiseSuppression: true,
          googHighpassFilter: true,
          googTypingNoiseDetection: true
        }
      });
      const v = document.getElementById("previewVideo");
      v.srcObject = previewStream;
      document.getElementById("previewOff").style.display = "none";
    } catch(e) {
      document.getElementById("previewOff").style.display = "flex";
    }
  }

  function togglePreMic() {
    preMicOn = !preMicOn;
    if (previewStream) previewStream.getAudioTracks().forEach(t => t.enabled = preMicOn);
    const btn = document.getElementById("preMicBtn");
    btn.textContent = preMicOn ? "🎙️ Mic On" : "🔇 Mic Off";
    btn.classList.toggle("off", !preMicOn);
  }

  function togglePreCam() {
    preCamOn = !preCamOn;
    if (previewStream) previewStream.getVideoTracks().forEach(t => t.enabled = preCamOn);
    const btn = document.getElementById("preCamBtn");
    btn.textContent = preCamOn ? "📷 Cam On" : "🚫 Cam Off";
    btn.classList.toggle("off", !preCamOn);
    document.getElementById("previewOff").style.display = preCamOn ? "none" : "flex";
  }

  function joinFromPrejoin() {
    const nameVal = document.getElementById("nameInput").value.trim();
    MY_NAME = nameVal || "Guest";
    micOn = preMicOn;
    camOn = preCamOn;
    localStream = previewStream;
    document.getElementById("prejoinScreen").style.display = "none";
    document.getElementById("roomWrapper").style.display = "flex";
    startRoom();
  }

  document.getElementById("nameInput").addEventListener("keydown", e => { if (e.key === "Enter") joinFromPrejoin(); });

  // ── TIMER ────────────────────────────────────
  let seconds = 0;
  let timerInterval = null;
  function startTimer() {
    timerInterval = setInterval(() => {
      seconds++;
      const h = String(Math.floor(seconds / 3600)).padStart(2,"0");
      const m = String(Math.floor((seconds % 3600) / 60)).padStart(2,"0");
      const s = String(seconds % 60).padStart(2,"0");
      document.getElementById("callTimer").textContent = `${h}:${m}:${s}`;
    }, 1000);
  }

  // ── NOTIFICATIONS ────────────────────────────
  function showNotif(msg, type = "info") {
    const stack = document.getElementById("notifStack");
    const n = document.createElement("div");
    n.className = `notif notif-${type}`;
    n.textContent = msg;
    stack.appendChild(n);
    setTimeout(() => n.classList.add("show"), 10);
    setTimeout(() => { n.classList.remove("show"); setTimeout(() => n.remove(), 400); }, 3500);
  }

  // ── CHAT ─────────────────────────────────────
  function addChatMsg(name, msg, isSelf = false) {
    const box = document.getElementById("chatMessages");
    const div = document.createElement("div");
    div.className = `chat-msg ${isSelf ? "self" : "other"}`;
    div.innerHTML = `<span class="chat-name">${name}</span><span class="chat-text">${msg}</span>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
    // badge
    if (!document.getElementById("chatPanel").style.display || document.getElementById("chatPanel").style.display === "none") {
      const btn = document.querySelector(".header-btn[onclick='toggleChat()']");
      if (btn) btn.classList.add("badge");
    }
  }

  function sendChat() {
    const input = document.getElementById("chatInput");
    const msg = input.value.trim();
    if (!msg) return;
    socket.emit("chat", { roomId: ROOM_ID, name: MY_NAME, msg });
    addChatMsg(MY_NAME, msg, true);
    input.value = "";
  }

  document.getElementById("chatInput").addEventListener("keydown", e => { if (e.key === "Enter") sendChat(); });

  function toggleChat() {
    const panel = document.getElementById("chatPanel");
    const open = panel.style.display === "none" || !panel.style.display;
    panel.style.display = open ? "flex" : "none";
    if (open) {
      document.querySelector(".header-btn[onclick='toggleChat()']").classList.remove("badge");
      document.getElementById("chatMessages").scrollTop = document.getElementById("chatMessages").scrollHeight;
    }
  }

  // ── PARTICIPANTS PANEL ───────────────────────
  function toggleParticipantsPanel() {
    const panel = document.getElementById("participantsPanel");
    panel.style.display = (panel.style.display === "none" || !panel.style.display) ? "flex" : "none";
  }

  function updateParticipantsList() {
    const list = document.getElementById("participantsList");
    list.innerHTML = "";

    // Self
    const selfDiv = document.createElement("div");
    selfDiv.className = "participant-item";
    selfDiv.innerHTML = `
      <div class="p-avatar">${MY_NAME[0].toUpperCase()}</div>
      <div class="p-info">
        <span class="p-name">${MY_NAME} (You) ${isHost ? '<span class="host-badge">👑 Host</span>' : ''}</span>
        <span class="p-status">${micOn ? "🎙️" : "🔇"} ${camOn ? "📷" : "🚫"}</span>
      </div>`;
    list.appendChild(selfDiv);

    // Others
    Object.entries(peerNames).forEach(([id, name]) => {
      const isThisHost = id === hostId;
      const div = document.createElement("div");
      div.className = "participant-item";
      div.innerHTML = `
        <div class="p-avatar">${name[0].toUpperCase()}</div>
        <div class="p-info">
          <span class="p-name">${name} ${isThisHost ? '<span class="host-badge">👑 Host</span>' : ''}</span>
          <span class="p-status">${peerMuted[id] ? "🔇" : "🎙️"}</span>
        </div>
        <div class="p-actions">
          <button class="p-mute-btn" onclick="muteParticipant('${id}')" title="${peerMuted[id] ? 'Unmute locally' : 'Mute locally'}">
            ${peerMuted[id] ? "🔊" : "🔇"}
          </button>
          ${isHost ? `
          <button class="p-host-mute-btn" onclick="hostMute('${id}')" title="Force mute">🎙️✕</button>
          <button class="p-kick-btn" onclick="kickParticipant('${id}', '${name}')" title="Kick">🚫</button>
          ` : ''}
        </div>`;
      list.appendChild(div);
    });

    document.getElementById("participantCount").textContent = Object.keys(peerNames).length + 1;

    // Show DM button if there are other participants
    const dmBtn = document.getElementById("dmHeaderBtn");
    if (Object.keys(peerNames).length > 0) dmBtn.style.display = "";
    else dmBtn.style.display = "none";
  }

  function hostMute(targetId) {
    socket.emit("host-mute", { roomId: ROOM_ID, targetUserId: targetId });
    showNotif("Participant muted", "info");
  }

  function kickParticipant(targetId, name) {
    if (confirm(`Remove ${name} from the room?`)) {
      socket.emit("host-kick", { roomId: ROOM_ID, targetUserId: targetId });
    }
  }

  function muteParticipant(peerId) {
    const tile = document.getElementById(`tile-${peerId}`);
    if (!tile) return;
    const video = tile.querySelector("video");
    peerMuted[peerId] = !peerMuted[peerId];
    video.muted = peerMuted[peerId];
    updateParticipantsList();
  }

  // ── VIDEO TILES ──────────────────────────────
  function addVideoStream(id, stream, name, isLocal = false) {
    if (document.getElementById(`tile-${id}`)) return;
    const tile = document.createElement("div");
    tile.className = "video-tile";
    tile.id = `tile-${id}`;

    const video = document.createElement("video");
    video.srcObject = stream;
    video.autoplay = true;
    video.playsInline = true;
    video.muted = isLocal; // only mute self, never mute remote
    video.volume = 1.0;

    // iOS/Safari fix - need user interaction to play audio
    video.addEventListener("loadedmetadata", () => {
      video.play().catch(e => console.warn("Autoplay blocked:", e));
    });

    const label = document.createElement("div");
    label.className = "video-label";
    label.textContent = isLocal ? `${name} (You)` : name;

    // Camera panel thumbnail
    addCamPanelTile(id, stream, name, isLocal);

    tile.appendChild(video);
    tile.appendChild(label);
    document.getElementById("videoGrid").appendChild(tile);
  }

  function removeVideoStream(id) {
    const tile = document.getElementById(`tile-${id}`);
    if (tile) tile.remove();
    const camTile = document.getElementById(`cam-${id}`);
    if (camTile) camTile.remove();
  }

  // ── WEBRTC ───────────────────────────────────
  // Force high quality audio codec
  function setAudioCodec(pc) {
    try {
      const transceivers = pc.getTransceivers();
      transceivers.forEach(transceiver => {
        if (transceiver.sender && transceiver.sender.track && transceiver.sender.track.kind === "audio") {
          const capabilities = RTCRtpSender.getCapabilities("audio");
          if (capabilities) {
            // Prefer opus with high bitrate
            const opus = capabilities.codecs.filter(c => c.mimeType === "audio/opus");
            const others = capabilities.codecs.filter(c => c.mimeType !== "audio/opus");
            transceiver.setCodecPreferences([...opus, ...others]);
          }
        }
      });
    } catch(e) { console.warn("Codec preference not supported:", e); }
  }

  const ICE_CONFIG = {
    iceServers: [
      { urls: "stun:stun.l.google.com:19302" },
      { urls: "stun:stun1.l.google.com:19302" },
      { urls: "stun:stun2.l.google.com:19302" },
      { urls: "stun:stun3.l.google.com:19302" },
      { urls: "stun:stun4.l.google.com:19302" },
      { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" },
      { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" },
      { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelayproject", credential: "openrelayproject" },
      { urls: "turns:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" }
    ],
    iceCandidatePoolSize: 10
  };

  function createPeer(userId, initiator, userName) {
    const peer = new SimplePeer({ initiator, trickle: true, stream: localStream, config: ICE_CONFIG });

    peer.on("signal", signal => socket.emit("signal", { to: userId, from: MY_ID, signal, name: MY_NAME }));

    peer.on("connect", () => {
      // Set high audio bitrate via SDP
      try {
        const pc = peer._pc;
        setAudioCodec(pc);
        pc.getSenders().forEach(sender => {
          if (sender.track && sender.track.kind === "audio") {
            const params = sender.getParameters();
            if (!params.encodings) params.encodings = [{}];
            params.encodings[0].maxBitrate = 128000; // 128kbps audio
            sender.setParameters(params).catch(e => console.warn("setParameters:", e));
          }
          if (sender.track && sender.track.kind === "video") {
            const params = sender.getParameters();
            if (!params.encodings) params.encodings = [{}];
            params.encodings[0].maxBitrate = 2500000; // 2.5mbps video
            sender.setParameters(params).catch(e => console.warn("setParameters:", e));
          }
        });
      } catch(e) { console.warn("Bitrate setting failed:", e); }
    });

    peer.on("stream", stream => {
      peerNames[userId] = userName || "Guest";
      // update video if tile already exists
      const existing = document.getElementById(`tile-${userId}`);
      if (existing) {
        existing.querySelector("video").srcObject = stream;
        const camTile = document.getElementById(`cam-${userId}`);
        if (camTile) camTile.querySelector("video").srcObject = stream;
      } else {
        addVideoStream(userId, stream, peerNames[userId]);
      }
      updateParticipantsList();
      setTimeout(applyLayout, 200);
    });

    peer.on("track", (track, stream) => {
      // Fallback: update video when individual track arrives
      const tile = document.getElementById(`tile-${userId}`);
      if (tile && stream) {
        tile.querySelector("video").srcObject = stream;
      }
    });

    peer.on("close", () => {
      removeVideoStream(userId);
      delete peers[userId];
      delete peerNames[userId];
      delete peerMuted[userId];
      updateParticipantsList();
    });

    peer.on("error", err => {
      console.error("Peer error:", err);
    });

    peers[userId] = peer;
    return peer;
  }

  // ── SOCKET ───────────────────────────────────
  // Get list of users already in room -> we initiate to each of them
  socket.on("existing-users", (users) => {
    console.log("Existing users:", users);
    users.forEach(({ userId, name }) => {
      if (userId !== MY_ID) {
        peerNames[userId] = name;
        createPeer(userId, true, name); // we are the initiator
      }
    });
    updateParticipantsList();
  });

  // New user joined -> they will initiate to us, we just wait for signal
  socket.on("user-connected", ({ userId, name }) => {
    console.log("User connected:", userId, name);
    peerNames[userId] = name;
    showNotif(`${name} joined the room 🎉`, "join");
    updateParticipantsList();
  });

  socket.on("signal", ({ from, signal, name }) => {
    console.log("Signal from:", from, signal.type || "candidate");
    if (!peers[from]) {
      // we're the receiver
      peerNames[from] = name || peerNames[from] || "Guest";
      createPeer(from, false, peerNames[from]);
    }
    try { peers[from].signal(signal); } catch(e) { console.error("Signal error:", e); }
  });

  socket.on("user-disconnected", ({ userId, name }) => {
    if (peers[userId]) { peers[userId].destroy(); delete peers[userId]; }
    removeVideoStream(userId);
    delete peerNames[userId];
    delete peerMuted[userId];
    showNotif(`${name} left the room 👋`, "leave");
    updateParticipantsList();
  });

  socket.on("chat-message", ({ name, msg }) => {
    addChatMsg(name, msg);
    showNotif(`${name}: ${msg.substring(0, 40)}`, "chat");
  });

  // Host assignment
  socket.on("host-assigned", ({ hostId: hId, isYou }) => {
    hostId = hId;
    isHost = isYou;
    if (isYou) showNotif("👑 You are the host", "join");
    updateParticipantsList();
  });

  // Force muted by host
  socket.on("force-mute", () => {
    if (micOn) toggleMic();
    showNotif("🔇 You were muted by the host", "leave");
  });

  // Participant was muted (update UI for everyone)
  socket.on("participant-muted", ({ userId }) => {
    updateParticipantsList();
  });

  // Someone was kicked
  socket.on("participant-kicked", ({ userId: kickedId, name }) => {
    if (peers[kickedId]) { peers[kickedId].destroy(); delete peers[kickedId]; }
    removeVideoStream(kickedId);
    delete peerNames[kickedId];
    delete peerMuted[kickedId];
    showNotif(`${name} was removed from the room`, "leave");
    updateParticipantsList();
  });

  // You were kicked
  socket.on("you-were-kicked", () => {
    alert("You have been removed from the room by the host.");
    window.location.href = "/";
  });

  // DM received
  socket.on("dm-received", ({ fromId, fromName, msg }) => {
    if (!dmConversations[fromId]) dmConversations[fromId] = [];
    dmConversations[fromId].push({ from: fromName, msg, self: false, time: new Date() });

    // Show notification
    showNotif(`✉️ DM from ${fromName}: ${msg.substring(0, 30)}`, "chat");

    // If DM panel is open for this person, update it
    if (activeDmUserId === fromId) {
      renderDmMessages(fromId);
    } else {
      // Show badge
      document.getElementById("dmBadge").style.display = "inline";
      document.getElementById("dmHeaderBtn").style.display = "";
    }
  });

  // ── CONTROLS ─────────────────────────────────
  function toggleMic() {
    micOn = !micOn;
    localStream.getAudioTracks().forEach(t => t.enabled = micOn);
    document.getElementById("micIcon").textContent = micOn ? "🎙️" : "🔇";
    document.getElementById("micBtn").classList.toggle("off", !micOn);
    document.querySelector("#micBtn .ctrl-label").textContent = micOn ? "Mute" : "Unmute";
    updateParticipantsList();
  }

  function toggleCam() {
    camOn = !camOn;
    localStream.getVideoTracks().forEach(t => t.enabled = camOn);
    document.getElementById("camIcon").textContent = camOn ? "📷" : "🚫";
    document.getElementById("camBtn").classList.toggle("off", !camOn);
    document.querySelector("#camBtn .ctrl-label").textContent = camOn ? "Camera" : "Cam Off";
    updateParticipantsList();
  }

  let audioContext = null;
  let mixedAudioTrack = null;
  let mixedAudioStream = null;

  async function toggleScreen() {
    if (!sharing) {
      try {
        screenStream = await navigator.mediaDevices.getDisplayMedia({
          video: { cursor: "always", frameRate: { ideal: 30 } },
          audio: true
        });

        const screenVideoTrack = screenStream.getVideoTracks()[0];
        const screenAudioTrack = screenStream.getAudioTracks()[0];
        const micTrack = localStream.getAudioTracks()[0];

        // Mix mic + screen audio together using Web Audio API
        // This way mic stays active and screen audio is added on top
        let audioTrackToSend = micTrack;
        if (screenAudioTrack) {
          try {
            audioContext = new AudioContext();
            const dest = audioContext.createMediaStreamDestination();

            // Add mic
            if (micTrack) {
              const micStream = new MediaStream([micTrack]);
              const micSource = audioContext.createMediaStreamSource(micStream);
              micSource.connect(dest);
            }

            // Add screen audio
            const screenAudioStream = new MediaStream([screenAudioTrack]);
            const screenSource = audioContext.createMediaStreamSource(screenAudioStream);
            screenSource.connect(dest);

            mixedAudioStream = dest.stream;
            mixedAudioTrack = mixedAudioStream.getAudioTracks()[0];
            audioTrackToSend = mixedAudioTrack;
          } catch(e) {
            console.warn("Audio mixing failed, using mic only:", e);
            audioTrackToSend = micTrack;
          }
        }

        // Replace ONLY video track for all peers, keep audio as mixed
        Object.values(peers).forEach(peer => {
          const senders = peer._pc.getSenders();
          const videoSender = senders.find(s => s.track && s.track.kind === "video");
          if (videoSender) videoSender.replaceTrack(screenVideoTrack);
          if (audioTrackToSend) {
            const audioSender = senders.find(s => s.track && s.track.kind === "audio");
            if (audioSender) audioSender.replaceTrack(audioTrackToSend);
          }
        });

        // Show screen in local tile (video only, keep cam audio)
        const previewStream = new MediaStream([screenVideoTrack]);
        document.querySelector(`#tile-${MY_ID} video`).srcObject = previewStream;

        sharing = true;
        document.getElementById("screenBtn").classList.add("active-share");
        document.querySelector("#screenBtn .ctrl-label").textContent = "Stop";

        // When screen share ends (user clicks stop in browser bar)
        screenVideoTrack.onended = stopScreen;

        // Also watch if screen audio track ends separately
        if (screenAudioTrack) {
          screenAudioTrack.onended = () => {
            // Screen audio ended but keep sharing video
            console.log("Screen audio ended, continuing with mic only");
          };
        }

      } catch(e) {
        if (e.name !== "NotAllowedError") console.error("Screen share error:", e);
      }
    } else { stopScreen(); }
  }

  function stopScreen() {
    if (!screenStream) return;

    // Stop screen tracks
    screenStream.getTracks().forEach(t => t.stop());

    // Clean up audio context
    if (audioContext) {
      audioContext.close().catch(() => {});
      audioContext = null;
    }
    mixedAudioTrack = null;
    mixedAudioStream = null;

    // Restore original cam + mic tracks
    const camTrack = localStream.getVideoTracks()[0];
    const micTrack = localStream.getAudioTracks()[0];

    Object.values(peers).forEach(peer => {
      const senders = peer._pc.getSenders();
      const videoSender = senders.find(s => s.track && s.track.kind === "video");
      if (videoSender && camTrack) videoSender.replaceTrack(camTrack);
      const audioSender = senders.find(s => s.track && s.track.kind === "audio");
      if (audioSender && micTrack) audioSender.replaceTrack(micTrack);
    });

    // Restore local video preview
    document.querySelector(`#tile-${MY_ID} video`).srcObject = localStream;

    sharing = false;
    document.getElementById("screenBtn").classList.remove("active-share");
    document.querySelector("#screenBtn .ctrl-label").textContent = "Share";
    screenStream = null;
  }

  function leaveRoom() {
    if (confirm("Leave the room?")) {
      localStream?.getTracks().forEach(t => t.stop());
      screenStream?.getTracks().forEach(t => t.stop());
      window.location.href = "/";
    }
  }

  // ── DEVICE SELECTOR ──────────────────────────
  async function openDevicePanel(kind) {
    const devices = await navigator.mediaDevices.enumerateDevices();
    document.getElementById("devicePanelTitle").textContent = kind === "audio" ? "🔊 Audio Settings" : "📷 Camera Settings";
    const list = document.getElementById("deviceList");
    list.innerHTML = "";

    if (kind === "audio") {
      // Input section
      const inputLabel = document.createElement("div");
      inputLabel.className = "device-section-label";
      inputLabel.textContent = "🎙️ Microphone (Input)";
      list.appendChild(inputLabel);

      const inputs = devices.filter(d => d.kind === "audioinput");
      inputs.forEach(device => {
        const btn = document.createElement("button");
        btn.className = "device-item";
        if (device.deviceId === selectedAudioId) btn.classList.add("selected");
        btn.textContent = device.label || `Microphone ${device.deviceId.slice(0,8)}`;
        btn.onclick = () => selectDevice("audio", device.deviceId);
        list.appendChild(btn);
      });

      // Output section
      const outputLabel = document.createElement("div");
      outputLabel.className = "device-section-label";
      outputLabel.style.marginTop = "0.75rem";
      outputLabel.textContent = "🔊 Speaker (Output)";
      list.appendChild(outputLabel);

      const outputs = devices.filter(d => d.kind === "audiooutput");
      if (outputs.length === 0) {
        const none = document.createElement("div");
        none.className = "device-item-empty";
        none.textContent = "Default system output";
        list.appendChild(none);
      } else {
        outputs.forEach(device => {
          const btn = document.createElement("button");
          btn.className = "device-item";
          if (device.deviceId === selectedAudioOutputId) btn.classList.add("selected");
          btn.textContent = device.label || `Speaker ${device.deviceId.slice(0,8)}`;
          btn.onclick = () => selectAudioOutput(device.deviceId);
          list.appendChild(btn);
        });
      }

    } else {
      const inputLabel = document.createElement("div");
      inputLabel.className = "device-section-label";
      inputLabel.textContent = "📷 Camera (Input)";
      list.appendChild(inputLabel);

      const cameras = devices.filter(d => d.kind === "videoinput");
      cameras.forEach(device => {
        const btn = document.createElement("button");
        btn.className = "device-item";
        if (device.deviceId === selectedVideoId) btn.classList.add("selected");
        btn.textContent = device.label || `Camera ${device.deviceId.slice(0,8)}`;
        btn.onclick = () => selectDevice("video", device.deviceId);
        list.appendChild(btn);
      });
    }

    document.getElementById("devicePanel").classList.add("open");
    document.getElementById("deviceOverlay").classList.add("open");
  }

  let selectedAudioOutputId = null;
  async function selectAudioOutput(deviceId) {
    selectedAudioOutputId = deviceId;
    closeDevicePanel();
    // Apply to all remote video elements
    document.querySelectorAll(".video-tile video:not([muted])").forEach(async video => {
      if (video.setSinkId) {
        try { await video.setSinkId(deviceId); } catch(e) { console.warn("setSinkId failed:", e); }
      }
    });
  }

  function closeDevicePanel() {
    document.getElementById("devicePanel").classList.remove("open");
    document.getElementById("deviceOverlay").classList.remove("open");
  }

  async function selectDevice(kind, deviceId) {
    if (kind === "audio") selectedAudioId = deviceId;
    else selectedVideoId = deviceId;
    closeDevicePanel();
    const newStream = await navigator.mediaDevices.getUserMedia({
      video: selectedVideoId
        ? { deviceId: { exact: selectedVideoId }, width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } }
        : { width: { ideal: 1920 }, height: { ideal: 1080 }, frameRate: { ideal: 30 } },
      audio: {
        ...(selectedAudioId ? { deviceId: { exact: selectedAudioId } } : {}),
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true,
        sampleRate: 48000,
        sampleSize: 16,
        channelCount: 2,
        latency: 0,
        googEchoCancellation: true,
        googAutoGainControl: true,
        googNoiseSuppression: true,
        googHighpassFilter: true,
        googTypingNoiseDetection: true
      },
    });
    const oldStream = localStream;
    localStream = newStream;
    if (!micOn) localStream.getAudioTracks().forEach(t => t.enabled = false);
    if (!camOn) localStream.getVideoTracks().forEach(t => t.enabled = false);
    document.querySelector(`#tile-${MY_ID} video`).srcObject = localStream;
    oldStream.getTracks().forEach(t => t.stop());
    Object.values(peers).forEach(peer => {
      localStream.getTracks().forEach(track => {
        const sender = peer._pc.getSenders().find(s => s.track && s.track.kind === track.kind);
        if (sender) sender.replaceTrack(track);
      });
    });
  }

  // ── MIRROR ───────────────────────────────────
  let mirrored = true;
  function toggleMirror() {
    mirrored = !mirrored;
    const localVideo = document.querySelector(`#tile-${MY_ID} video`);
    const camPanelVideo = document.querySelector(`#cam-${MY_ID} video`);
    const previewVideo = document.getElementById("previewVideo");
    const style = mirrored ? "scaleX(-1)" : "scaleX(1)";
    if (localVideo) localVideo.style.transform = style;
    if (camPanelVideo) camPanelVideo.style.transform = style;
    if (previewVideo) previewVideo.style.transform = style;
    document.getElementById("mirrorBtn").classList.toggle("active-share", mirrored);
  }

  // ── LAYOUTS ──────────────────────────────────
  let currentLayout = "gallery";
  let speakerFocusId = null;

  function toggleLayoutPanel() {
    const panel = document.getElementById("layoutPanel");
    const overlay = document.getElementById("layoutOverlay");
    const open = panel.style.display === "none" || !panel.style.display;
    panel.style.display = open ? "block" : "none";
    overlay.style.display = open ? "block" : "none";
  }

  function setLayout(layout) {
    currentLayout = layout;
    // Update active button
    document.querySelectorAll(".layout-option").forEach(b => b.classList.remove("active"));
    document.getElementById(`layout-${layout}`).classList.add("active");
    toggleLayoutPanel();
    applyLayout();
  }

  function applyLayout() {
    const grid = document.getElementById("videoGrid");
    const tiles = [...grid.querySelectorAll(".video-tile")];
    const pip = document.getElementById("floatingPip");
    const pipVideo = document.getElementById("pipVideo");
    const localTile = document.getElementById(`tile-${MY_ID}`);

    // Reset all
    grid.className = "video-grid";
    grid.style.cssText = "";
    tiles.forEach(t => { t.style.cssText = ""; t.classList.remove("focused","hidden","immersive-main","immersive-overlay"); });
    pip.style.display = "none";
    if (localTile) localTile.style.display = "";

    if (currentLayout === "gallery") {
      grid.classList.add("layout-gallery");

    } else if (currentLayout === "speaker") {
      grid.classList.add("layout-speaker");
      // Biggest = first non-self, or self if alone
      const focused = tiles.find(t => t.id !== `tile-${MY_ID}`) || tiles[0];
      tiles.forEach(t => {
        if (t === focused) t.classList.add("focused");
      });

    } else if (currentLayout === "fullscreen") {
      grid.classList.add("layout-fullscreen");
      const focused = tiles.find(t => t.id !== `tile-${MY_ID}`) || tiles[0];
      tiles.forEach(t => {
        if (t !== focused) t.style.display = "none";
        else t.classList.add("focused");
      });

    } else if (currentLayout === "multispeaker") {
      grid.classList.add("layout-multispeaker");
      const focused = tiles.find(t => t.id !== `tile-${MY_ID}`) || tiles[0];
      focused.classList.add("focused");

    } else if (currentLayout === "immersive") {
      grid.classList.add("layout-immersive");
      const main = tiles.find(t => t.id !== `tile-${MY_ID}`) || tiles[0];
      const overlay = tiles.find(t => t !== main);
      main.classList.add("immersive-main");
      if (overlay) overlay.classList.add("immersive-overlay");
      tiles.forEach(t => {
        if (t !== main && t !== overlay) t.style.display = "none";
      });

    } else if (currentLayout === "floating") {
      grid.classList.add("layout-floating");
      // Hide local tile, show as floating PiP
      if (localTile) localTile.style.display = "none";
      const localVideo = localTile ? localTile.querySelector("video") : null;
      if (localVideo) {
        pipVideo.srcObject = localVideo.srcObject;
        pip.style.display = "flex";
      }
      // Make remote tiles fill
      tiles.forEach(t => {
        if (t.id !== `tile-${MY_ID}`) t.classList.add("focused");
      });
    }
  }

  // Draggable PiP
  (function() {
    let dragging = false, ox = 0, oy = 0;
    const handle = document.getElementById("pipHandle");
    const pip = document.getElementById("floatingPip");
    if (!handle || !pip) return;
    handle.addEventListener("mousedown", e => {
      dragging = true;
      ox = e.clientX - pip.offsetLeft;
      oy = e.clientY - pip.offsetTop;
      e.preventDefault();
    });
    handle.addEventListener("touchstart", e => {
      dragging = true;
      ox = e.touches[0].clientX - pip.offsetLeft;
      oy = e.touches[0].clientY - pip.offsetTop;
    }, { passive: true });
    document.addEventListener("mousemove", e => {
      if (!dragging) return;
      pip.style.left = (e.clientX - ox) + "px";
      pip.style.top = (e.clientY - oy) + "px";
      pip.style.right = "auto"; pip.style.bottom = "auto";
    });
    document.addEventListener("touchmove", e => {
      if (!dragging) return;
      pip.style.left = (e.touches[0].clientX - ox) + "px";
      pip.style.top = (e.touches[0].clientY - oy) + "px";
      pip.style.right = "auto"; pip.style.bottom = "auto";
    }, { passive: true });
    document.addEventListener("mouseup", () => dragging = false);
    document.addEventListener("touchend", () => dragging = false);
  })();

  // ── DM SYSTEM ────────────────────────────────
  function toggleDmList() {
    // Show list of people to DM
    const panel = document.getElementById("dmPanel");
    const isOpen = panel.style.display !== "none";
    if (isOpen && activeDmUserId === null) { panel.style.display = "none"; return; }
    activeDmUserId = null;
    panel.style.display = "flex";
    document.getElementById("dmPanelTitle").textContent = "Direct Messages";
    document.getElementById("dmBadge").style.display = "none";

    // Show list of participants to DM
    const msgs = document.getElementById("dmMessages");
    msgs.innerHTML = "";
    if (Object.keys(peerNames).length === 0) {
      msgs.innerHTML = '<div style="color:var(--muted);padding:1rem;font-size:0.85rem;">No one else in the room yet.</div>';
      return;
    }
    Object.entries(peerNames).forEach(([id, name]) => {
      const unread = dmConversations[id]?.filter(m => !m.self && !m.read).length || 0;
      const item = document.createElement("div");
      item.className = "dm-person-item";
      item.innerHTML = `
        <div class="p-avatar">${name[0].toUpperCase()}</div>
        <div class="p-info">
          <span class="p-name">${name}</span>
          <span class="p-status" style="font-size:0.75rem;color:var(--muted)">
            ${dmConversations[id]?.length ? dmConversations[id][dmConversations[id].length-1].msg.substring(0,25)+'...' : 'No messages yet'}
          </span>
        </div>
        ${unread ? `<span class="dm-unread-badge">${unread}</span>` : ''}
      `;
      item.onclick = () => openDm(id, name);
      msgs.appendChild(item);
    });
    document.getElementById("dmInput").style.display = "none";
    document.querySelector(".chat-input-row button").style.display = "none";
  }

  function openDm(userId, name) {
    activeDmUserId = userId;
    document.getElementById("dmPanelTitle").textContent = `✉️ ${name}`;
    document.getElementById("dmInput").style.display = "";
    document.getElementById("dmInput").placeholder = `Message ${name}...`;
    document.querySelector(".chat-input-row button").style.display = "";

    // Mark as read
    if (dmConversations[userId]) {
      dmConversations[userId].forEach(m => m.read = true);
    }
    renderDmMessages(userId);
  }

  function renderDmMessages(userId) {
    const msgs = document.getElementById("dmMessages");
    msgs.innerHTML = "";
    const convo = dmConversations[userId] || [];
    if (convo.length === 0) {
      msgs.innerHTML = '<div style="color:var(--muted);padding:1rem;font-size:0.82rem;text-align:center;">No messages yet. Say hi! 👋</div>';
      return;
    }
    convo.forEach(({ from, msg, self }) => {
      const div = document.createElement("div");
      div.className = `chat-msg ${self ? "self" : "other"}`;
      div.innerHTML = `<span class="chat-name">${self ? "You" : from}</span><span class="chat-text">${msg}</span>`;
      msgs.appendChild(div);
    });
    msgs.scrollTop = msgs.scrollHeight;
  }

  function sendDm() {
    if (!activeDmUserId) return;
    const input = document.getElementById("dmInput");
    const msg = input.value.trim();
    if (!msg) return;
    socket.emit("dm", { toUserId: activeDmUserId, fromName: MY_NAME, msg });
    if (!dmConversations[activeDmUserId]) dmConversations[activeDmUserId] = [];
    dmConversations[activeDmUserId].push({ from: MY_NAME, msg, self: true, time: new Date() });
    renderDmMessages(activeDmUserId);
    input.value = "";
  }

  function closeDm() {
    if (activeDmUserId !== null) {
      // Go back to DM list
      toggleDmList();
    } else {
      document.getElementById("dmPanel").style.display = "none";
    }
  }

  document.getElementById("dmInput").addEventListener("keydown", e => { if (e.key === "Enter") sendDm(); });

  // ── CAM PANEL ────────────────────────────────
  function toggleCamPanel() {
    const panel = document.getElementById("camPanel");
    panel.style.display = (panel.style.display === "none" || !panel.style.display) ? "flex" : "none";
  }

  function addCamPanelTile(id, stream, name, isLocal = false) {
    if (document.getElementById(`cam-${id}`)) return;
    const tile = document.createElement("div");
    tile.className = "cam-tile";
    tile.id = `cam-${id}`;

    const video = document.createElement("video");
    video.srcObject = stream;
    video.autoplay = true;
    video.playsInline = true;
    video.muted = true; // always muted in cam panel to avoid echo

    const label = document.createElement("div");
    label.className = "cam-label";
    label.textContent = isLocal ? `${name} (You)` : name;

    tile.appendChild(video);
    tile.appendChild(label);
    document.getElementById("camPanelGrid").appendChild(tile);
  }

  // ── START ROOM ───────────────────────────────
  function startRoom() {
    // Sync button states with actual track states from prejoin
    micOn = localStream.getAudioTracks().some(t => t.enabled);
    camOn = localStream.getVideoTracks().some(t => t.enabled);

    // Sync mic button UI
    document.getElementById("micIcon").textContent = micOn ? "🎙️" : "🔇";
    document.getElementById("micBtn").classList.toggle("off", !micOn);
    document.querySelector("#micBtn .ctrl-label").textContent = micOn ? "Mute" : "Unmute";

    // Sync cam button UI
    document.getElementById("camIcon").textContent = camOn ? "📷" : "🚫";
    document.getElementById("camBtn").classList.toggle("off", !camOn);
    document.querySelector("#camBtn .ctrl-label").textContent = camOn ? "Camera" : "Cam Off";

    addVideoStream(MY_ID, localStream, MY_NAME, true);
    // Mirror local video by default
    setTimeout(() => {
      const lv = document.querySelector(`#tile-${MY_ID} video`);
      if (lv) lv.style.transform = "scaleX(-1)";
      const cv = document.querySelector(`#cam-${MY_ID} video`);
      if (cv) cv.style.transform = "scaleX(-1)";
    }, 100);
    updateParticipantsList();
    startTimer();
    socket.emit("join-room", { roomId: ROOM_ID, userId: MY_ID, name: MY_NAME });
  }

  startPreview();
</script>
</body>
